<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-section">
    <img src="https://img.freepik.com/free-psd/travel-tours-adventure-poster-template_47987-16880.jpg?semt=ais_user_personalization&w=740&q=80">
</div>
<div class="middle-section">
    <div class="text">
        <h2>OUTDOOR ACTIVITY</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    </div>

    <div class="img">
        <img src="https://images.squarespace-cdn.com/content/v1/5238f4e6e4b02e747c5476e2/1534176133795-EJZ3ZCPRGJTIRFZ0IP8W/hells+canyon+rafting+trip.jpg">
    </div>
</div>
<div class="bottom-section">
    <div class="tourism-container">
        <div class="tourism-title">
            <h2>TYPES OF TOURISM</h2>
        </div>
        <div class="tourism-cards">
            <section class="card pink">
                <img src="https://static.independent.co.uk/s3fs-public/thumbnails/image/2019/10/15/09/istock-483629308.jpg">
                <p>Hiking</p>
            </section>
            <section class="card blue">
                <img src="https://riverraftingkolad.in/wp-content/uploads/2025/02/River-Rafting-in-India.jpg">
                <p>Rafting</p>
            </section>
            <section class="card cream">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSXcs2EnhJY7_qN_CxMlCqutyEYMqMJtqWe2Q&s">
                <p>Winter Hiking</p>
            </section>
            <section class="card blue">
                <img src="https://sibexpeditions.com/wp-content/uploads/2018/05/sayan-ring-index-mini3.jpg">
                <p>Ethnotours & Expeditions</p>
            </section>
            <section class="card grey">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ92PDUHiEiCoYZ63-i-63n99beZo0pvkuuHg&s">
                <p>Other</p>
            </section>
        </div>
    </div>
</div>
<div class="suits-section">
    <h2>WHAT SUITS YOU CHOOSE</h2>
    <div class="tabs">
        <span class="active">Hiking</span>
        <span>Rafting and Kayaking</span>
        <span>Winter Hiking</span>
        <span>Other</span>
    </div>
    <div class="line"></div>
</div>
</body>
</html>
